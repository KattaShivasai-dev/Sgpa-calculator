<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGPA Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="shortcut icon" href="favicon - Copy.ico" type="image/x-icon">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:        #0d0f14;
      --surface:   #1d1f26;
      --card:      #1c2030;
      --border:    #2a2f42;
      --accent:    #6c63ff;
      --accent2:   #ff6b9d;
      --text:      #e8eaf6;
      --muted:     #7b82a8;
      --success:   #4ade80;
      --danger:    #f85c5c;
      --radius:    14px;
      --shadow:    0 8px 32px rgba(0,0,0,0.4);
    }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }
 
    /* ── Layout ── */
    .wrapper {
      max-width: 760px;
      margin: 0 auto;
    }
 
    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header .badge {
      display: inline-block;
      background: rgba(108,99,255,0.15);
      color: #a89cff;
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: 100px;
      font-size: 0.75rem;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 14px;
      margin-bottom: 1rem;
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #a89cff 60%, #ff6b9d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    header p {
      color: var(--muted);
      font-size: 0.95rem;
    }
 
    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }
 
    /* ── Subject Row ── */
    .subject-header {
      display: grid;
      grid-template-columns: 1fr 130px 130px 40px;
      gap: 10px;
      padding: 0 0 0.6rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }
    .subject-header span {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
 
    .subject-row {
      display: grid;
      grid-template-columns: 1fr 130px 130px 40px;
      gap: 10px;
      align-items: center;
      margin-bottom: 0.6rem;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* ── Inputs ── */
    input, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 9px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      -webkit-appearance: none;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    select option { background: #1c2030; }
 
    /* ── Delete Button ── */
    .btn-del {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: var(--danger);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .btn-del:hover { background: rgba(248,113,113,0.22); }
 
    /* ── Action Buttons ── */
    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .btn {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 10px;
      padding: 11px 22px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-add {
      background: rgba(108,99,255,0.15);
      color: #a89cff;
      border: 1px solid rgba(108,99,255,0.3);
    }
    .btn-add:hover { background: rgba(108,99,255,0.25); }
    .btn-calc {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 20px rgba(108,99,255,0.35);
      flex: 1;
      min-width: 140px;
    }
    .btn-calc:hover { box-shadow: 0 6px 28px rgba(108,99,255,0.5); }
    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-reset:hover { border-color: var(--muted); color: var(--text); }
 
    /* ── Result Panel ── */
    #result-panel {
      display: none;
      animation: fadeUp 0.35s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }
    .stat-label {
      font-size: 0.7rem;
      font-family: 'Syne', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 1.9rem;
      font-weight: 800;
    }
    .stat-val.main { color: var(--accent); font-size: 2.6rem; }
 
    /* ── Grade Bar ── */
    .grade-bar-wrap {
      margin-bottom: 1.25rem;
    }
    .grade-bar-wrap label {
      font-size: 0.75rem;
      font-family: 'Syne', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      display: block;
      margin-bottom: 0.5rem;
    }
    .grade-bar-bg {
      width: 100%;
      height: 8px;
      background: var(--surface);
      border-radius: 100px;
      overflow: hidden;
    }
    .grade-bar-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
      width: 0%;
    }
    .grade-tag {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 3px 12px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
    }
 
    /* ── Subject Breakdown ── */
    .breakdown-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .breakdown-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--surface);
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 0.87rem;
    }
    .breakdown-item .sub-name { color: var(--text); }
    .breakdown-item .sub-meta { color: var(--muted); font-size: 0.78rem; }
    .breakdown-item .sub-pts {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      color: #a89cff;
    }
 
    /* ── Grade Scale Reference ── */
    .scale-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
      gap: 6px;
    }
    .scale-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 6px;
      text-align: center;
    }
    .scale-item .sc-grade {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent);
    }
    .scale-item .sc-pts {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 1rem;
    }
 
    /* ── Responsive ── */
    @media (max-width: 520px) {
      .subject-header,
      .subject-row {
        grid-template-columns: 1fr 100px 100px 36px;
        gap: 6px;
      }
      input, select { font-size: 0.82rem; padding: 8px 8px; }
      .btn-calc { min-width: 100%; }
    }
    @media (max-width: 400px) {
      .subject-header { display: none; }
      .subject-row { grid-template-columns: 1fr 1fr 36px; }
      .subject-row input.credit-input { display: none; }
    }
  </style>
</head>
<body>
<div class="wrapper">
 
  <!-- Header -->
  <header>
    <div class="badge">GPA Tool</div>
    <h1>SGPA Calculator</h1>
    <p>Enter your subjects, grades &amp; credits to calculate your semester GPA</p>
  </header>
 
  <!-- Subjects Card -->
  <div class="card">
    <div class="card-title">Subjects</div>
    <div class="subject-header">
      <span>Subject Name</span>
      <span>Grade</span>
      <span>Credits</span>
      <span></span>
    </div>
    <div id="subjects-list"></div>
    <div class="actions">
      <button class="btn btn-add" onclick="addSubject()">+ Add Subject</button>
      <button class="btn btn-calc" onclick="calculate()">Calculate SGPA →</button>
      <button class="btn btn-reset" onclick="resetAll()">Reset</button>
    </div>
  </div>
 
  <!-- Result Panel -->
  <div id="result-panel">
    <div class="card">
      <div class="card-title">Result</div>
      <div class="result-grid">
        <div class="stat">
          <div class="stat-label">SGPA</div>
          <div class="stat-val main" id="res-sgpa">0.00</div>
        </div>
        <div class="stat">
          <div class="stat-label">Total Credits</div>
          <div class="stat-val" id="res-credits" style="color: var(--accent2);">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Grade Points</div>
          <div class="stat-val" id="res-points" style="color: var(--success);">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Subjects</div>
          <div class="stat-val" id="res-subs" style="color: var(--text);">0</div>
        </div>
      </div>
 
      <div class="grade-bar-wrap">
        <label>Performance Level</label>
        <div class="grade-bar-bg"><div class="grade-bar-fill" id="grade-bar"></div></div>
        <span class="grade-tag" id="grade-tag"></span>
      </div>
 
      <div class="breakdown-title">Subject Breakdown</div>
      <div id="breakdown-list"></div>
    </div>
  </div>
 
  <!-- Grade Scale Reference -->
  <div class="card">
    <div class="card-title">Grade Scale Reference</div>
    <div class="scale-grid" id="scale-grid"></div>
  </div>
 
</div>
 
<script>
  /* ─── Grade Scale ─── */
  const SCALE = [
    { grade: 'O',  label: 'Outstanding', points: 10 },
    { grade: 'A+', label: 'Excellent',   points: 9  },
    { grade: 'A',  label: 'Very Good',   points: 8  },
    { grade: 'B+', label: 'Good',        points: 7  },
    { grade: 'B',  label: 'Above Avg',   points: 6  },
    { grade: 'C',  label: 'Average',     points: 5  },
    { grade: 'P',  label: 'Pass',        points: 4  },
    { grade: 'F',  label: 'Fail',        points: 0  },
  ];
 
  /* ─── Render Scale ─── */
  const scaleGrid = document.getElementById('scale-grid');
  SCALE.forEach(s => {
    scaleGrid.innerHTML += `
      <div class="scale-item">
        <div class="sc-grade">${s.grade}</div>
        <div class="sc-pts">${s.points} pts</div>
      </div>`;
  });
 
  /* ─── Subject Management ─── */
  let subjectCount = 0;
 
  function addSubject(name = '', grade = '', credits = '') {
    subjectCount++;
    const id = `sub-${subjectCount}`;
    const list = document.getElementById('subjects-list');
 
    const options = SCALE.map(s =>
      `<option value="${s.points}" ${s.points == grade ? 'selected' : ''}>${s.grade} (${s.points})</option>`
    ).join('');
 
    const row = document.createElement('div');
    row.className = 'subject-row';
    row.id = id;
    row.innerHTML = `
      <input type="text" placeholder="e.g. Mathematics" value="${name}" class="name-input" />
      <select class="grade-input">${options}</select>
      <input type="number" min="1" max="6" step="1" placeholder="Credits" value="${credits}" class="credit-input" />
      <button class="btn-del" onclick="removeSubject('${id}')" title="Remove">×</button>
    `;
    list.appendChild(row);
  }
 
  function removeSubject(id) {
    const el = document.getElementById(id);
    if (el) {
      el.style.opacity = '0';
      el.style.transform = 'translateX(10px)';
      el.style.transition = 'opacity 0.2s, transform 0.2s';
      setTimeout(() => el.remove(), 200);
    }
  }
 
  /* ─── Calculate SGPA ─── */
  function calculate() {
    const rows = document.querySelectorAll('.subject-row');
    if (rows.length === 0) { alert('Please add at least one subject.'); return; }
 
    let totalPoints = 0;
    let totalCredits = 0;
    const details = [];
    let valid = true;
 
    rows.forEach(row => {
      const name    = row.querySelector('.name-input').value.trim() || 'Unnamed';
      const grade   = parseFloat(row.querySelector('.grade-input').value);
      const credits = parseFloat(row.querySelector('.credit-input').value);
 
      if (isNaN(credits) || credits <= 0) { valid = false; return; }
 
      totalPoints  += grade * credits;
      totalCredits += credits;
      details.push({ name, grade, credits, earned: grade * credits });
    });
 
    if (!valid) { alert('Please enter valid credit hours for all subjects.'); return; }
    if (totalCredits === 0) { alert('Total credits cannot be zero.'); return; }
 
    const sgpa = totalPoints / totalCredits;
 
    // Update stats
    document.getElementById('res-sgpa').textContent    = sgpa.toFixed(2);
    document.getElementById('res-credits').textContent = totalCredits;
    document.getElementById('res-points').textContent  = totalPoints.toFixed(1);
    document.getElementById('res-subs').textContent    = rows.length;
 
    // Grade bar
    const pct = (sgpa / 10) * 100;
    document.getElementById('grade-bar').style.width = pct + '%';
 
    const tag = document.getElementById('grade-tag');
    let label = 'Fail', tagColor = '#f87171', tagBg = 'rgba(248,113,113,0.12)';
    if (sgpa >= 9)      { label = '🏆 Outstanding';  tagColor = '#a89cff'; tagBg = 'rgba(108,99,255,0.15)'; }
    else if (sgpa >= 8) { label = '⭐ Excellent';     tagColor = '#4ade80'; tagBg = 'rgba(74,222,128,0.12)'; }
    else if (sgpa >= 7) { label = '✦ Very Good';     tagColor = '#60d0e4'; tagBg = 'rgba(96,208,228,0.12)'; }
    else if (sgpa >= 6) { label = '◆ Good';           tagColor = '#fbbf24'; tagBg = 'rgba(251,191,36,0.12)'; }
    else if (sgpa >= 5) { label = '▸ Average';        tagColor = '#f87171'; tagBg = 'rgba(248,113,113,0.12)'; }
    else if (sgpa >= 4) { label = '▹ Pass';           tagColor = '#94a3b8'; tagBg = 'rgba(148,163,184,0.12)'; }
    tag.textContent = label;
    tag.style.color = tagColor;
    tag.style.background = tagBg;
    tag.style.border = `1px solid ${tagColor}55`;
 
    // Breakdown
    const bList = document.getElementById('breakdown-list');
    bList.innerHTML = '';
    details.forEach(d => {
      const g = SCALE.find(s => s.points === d.grade);
      const gradeLabel = g ? g.grade : d.grade;
      bList.innerHTML += `
        <div class="breakdown-item">
          <div>
            <div class="sub-name">${d.name}</div>
            <div class="sub-meta">${d.credits} credits · Grade ${gradeLabel}</div>
          </div>
          <div class="sub-pts">${d.earned.toFixed(1)} pts</div>
        </div>`;
    });
 
    // Show panel
    const panel = document.getElementById('result-panel');
    panel.style.display = 'block';
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
 
  /* ─── Reset ─── */
  function resetAll() {
    document.getElementById('subjects-list').innerHTML = '';
    document.getElementById('result-panel').style.display = 'none';
    document.getElementById('grade-bar').style.width = '0%';
    subjectCount = 0;
    addSubject(); addSubject(); addSubject();
  }
 
  /* ─── Init with 3 default rows ─── */
  addSubject(); addSubject(); addSubject();
</script>
</body>
</html>
